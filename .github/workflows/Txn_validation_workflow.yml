name: Transaction binary Validation PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    
permissions:
  contents: write
  pull-requests: write

jobs:
  jenkins-check:
    runs-on: [self-hosted, X64, Windows, jenkins-host-runner]
    env:
      JENKINS_URL: "http://172.23.155.96:8080/"
      JENKINS_USER: "ips-lab"
      JENKINS_TOKEN: "115d61b0f96a470b614c9f09aacf0d3814"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Run Test suite Transaction binary Validation
        run: |
          $jenkinsUrl = "${{ env.JENKINS_URL }}"
          $user = "${{ env.JENKINS_USER }}"
          $token = "${{ env.JENKINS_TOKEN }}"
          $pair = "${user}:${token}"
          $base64AuthInfo = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          $headers = @{ Authorization = "Basic $base64AuthInfo" }

          $PR_NUMBER = "${{ github.event.pull_request.number }}"
          $REPO = "${{ github.repository }}"
          $aiert_branch = "${{ github.base_ref }}"

          $params = "AIE_RT_BRANCH_NAME=$aiert_branch&TEST_TYPE=long_regression&PATCH_NUM=$PR_NUMBER"
          function Get-BuildUrlFromQueue($queueUrl) {
            while ($true) {
              try {
                $queueInfo = Invoke-RestMethod -Uri "$queueUrl/api/json" -Headers $headers -Method Get
                if ($queueInfo.executable) {
                  return $queueInfo.executable.url
                }
              } catch {
                Write-Host "Waiting for job at $queueUrl to start..."
              }
              Start-Sleep -Seconds 5
            }
          }

          function Wait-ForJob($buildUrl) {
            while ($true) {
              try {
                $status = Invoke-RestMethod -Uri "$buildUrl/api/json" -Headers $headers -Method Get
                if (-not $status.building) {
                  Write-Host "Job at $buildUrl completed with result: $($status.result)"
                  return $status.result
                }
              } catch {
                Write-Host "Waiting for job at $buildUrl to be accessible..."
              }
              Start-Sleep -Seconds 10
            }
          }

          # Trigger Jenkins jobs
          $response = Invoke-WebRequest -Uri "$jenkinsUrl/job/Txn_bin_Validation_aie_patchnum/buildWithParameters?$params" -Method Post -Headers $headers -UseBasicParsing
          # Get actual build URLs
          $buildUrl = Get-BuildUrlFromQueue $response.Headers["Location"]
          if ($buildUrl -match "/(\d+)/$") {
            $BUILD_NUMBER = $matches[1]
            Write-Host "Jenkins build number: $BUILD_NUMBER"
          } else {
            Write-Host "Could not extract build number from build URL: $buildUrl"
          }     
          # Wait for jobs to complete
          echo "Latest Jenkins build number: $BUILD_NUMBER"
          Write-Host "Waiting for Jenkins job to complete at $buildUrl..."

          # Wait for jobs to complete
          $result = Wait-ForJob $buildUrl

          if (($result -eq "SUCCESS")) {
            Write-Host "Jenkins job succeeded. Attempting to merge the PR..."
            $jenkins_ip = "http://172.23.155.96:8080"
            Write-Host "Jenkins IP: $jenkins_ip"
            Write-Output "Find the result summary below ::"
            Write-Output "$jenkins_ip/job/Txn_bin_Validation_aie_patchnum/$BUILD_NUMBER/artifact/results/long_regression/simulator_aie/summary.html"

            $mergeUrl = "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/merge"
            $mergeHeaders = @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept = "application/vnd.github.v3+json"
            }
            $body = '{}'

            $commentUrl = "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments"
            $commentBody = @{
              body = "✅ Jenkins validation completed. Transaction validation job passed. PR is ready to merge."
            } | ConvertTo-Json -Depth 10
            #Invoke-RestMethod -Method Put -Uri "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/merge" -Headers $mergeHeaders -Body $body
            #Write-Host "Merge response: $($response | ConvertTo-Json)"
          } else {
            $NegativecommentBody = @{
              body = "❌ Jenkins validation failed. Transaction validation job did not pass."
            } | ConvertTo-Json -Depth 10
            Write-Host "Jenkins IP: $jenkins_ip"
            Write-Output "Find the issue summary below ::"
            Write-Output "$jenkins_ip/job/Txn_bin_Validation_aie_patchnum/$BUILD_NUMBER/artifact/results/long_regression/simulator_aie/summary.html"
            Write-Output "One or more Jenkins jobs failed. PR will not be merged."
            exit 1
          }
